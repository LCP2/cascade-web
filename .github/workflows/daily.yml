name: Daily AU movie refresh + Cascade monitor

# Once a day in the cloud: rebuild today's AU catalogue, commit the refreshed app + data
# (so GitHub Pages serves the latest AND git history carries "yesterday" for the diff), then
# run the Cascade monitor — diff today vs yesterday, match to each user's Cascades, de-dupe,
# and email one digest per user via Resend. Also runnable on demand from the Actions tab.
#
# Secrets are read from GitHub Actions secrets only (never hardcoded). When the Supabase +
# Resend secrets are absent (e.g. a first manual run before you've added them), the monitor
# runs in --dry-run so the workflow still passes.

on:
  schedule:
    - cron: "0 20 * * *"        # 20:00 UTC ≈ 6–7am Sydney. Fixed to UTC; drifts 1h with AU daylight saving.
  workflow_dispatch: {}          # manual "Run workflow" button — used for the one-time test email

permissions:
  contents: write                # allow the job to commit the refreshed files

concurrency:                     # never let two daily runs overlap
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo (carries yesterday's state for change-detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2         # need HEAD~1 so the monitor can read yesterday's movies.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build today's catalogue (ingest → enrich → poll → derive → build)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          WATCHMODE_API_KEY: ${{ secrets.WATCHMODE_API_KEY }}
        run: python poc_pipeline.py

      - name: Commit refreshed app + data (this becomes "today" for tomorrow's diff)
        run: |
          git config user.name  "cascade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html movies.json state
          git commit -m "Daily refresh $(date -u +%F)" || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Run the Cascade monitor (diff → match → de-dupe → email)
        # Reads yesterday's catalogue from git history (HEAD~1:movies.json). With the Supabase +
        # Resend secrets present it does the real thing; without them it runs --dry-run so the
        # workflow still passes (no writes, no email).
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CASCADE_EMAIL_FROM: ${{ secrets.CASCADE_EMAIL_FROM }}   # optional; defaults to Resend's test sender
          CASCADE_SITE_URL: ${{ secrets.SITE_URL }}               # optional; defaults to the live Pages URL
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -n "$RESEND_API_KEY" ]; then
            echo "Secrets present — live run (will send digests + write the notifications ledger)."
            python -m monitor
          else
            echo "Supabase/Resend secrets absent — running --dry-run (no writes, no email)."
            python -m monitor --dry-run
          fi
